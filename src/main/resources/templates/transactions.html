<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transactions - Personal Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .income { color: #22c55e; font-weight: bold; }
        .expense { color: #ef4444; font-weight: bold; }
        .form-control { border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>💰 All Transactions</h1>
            <a href="/" class="btn btn-secondary">← Back to Dashboard</a>
        </div>

        <!-- Add New Transaction Form -->
        <div class="card mb-5">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Add New Transaction</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/transactions}" th:object="${transaction}" method="post">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Type</label>
                            <select th:field="*{type}" class="form-select">
                                <option value="INCOME">Income (+)</option>
                                <option value="EXPENSE">Expense (-)</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Amount</label>
                            <input type="number" step="0.01" th:field="*{amount}" 
                                   class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Date</label>
                            <input type="date" th:field="*{date}" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Description</label>
                            <input type="text" th:field="*{description}" 
                                   class="form-control" placeholder="Salary / Grocery">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success mt-3">Save Transaction</button>
                </form>
            </div>
        </div>

        <!-- Transactions Table -->
        <h3>Transaction History</h3>
        <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Type</th>
                        <th class="text-end">Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tx : ${transactions}" th:if="${transactions != null and !transactions.isEmpty()}">
                        <td th:text="${tx.date}"></td>
                        <td th:text="${tx.description}"></td>
                        <td>
                            <span th:if="${tx.type == 'INCOME'}" class="badge bg-success fs-6">INCOME</span>
                            <span th:if="${tx.type == 'EXPENSE'}" class="badge bg-danger fs-6">EXPENSE</span>
                        </td>
                        <td class="text-end fw-bold" 
                            th:class="${tx.type == 'INCOME'} ? 'income' : 'expense'"
                            th:text="${tx.amount}"></td>
                        <td>
                            <a th:href="@{/transactions/delete/{id}(id=${tx.id})}" 
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Delete this transaction?')">Delete</a>
                        </td>
                    </tr>
                    <tr th:if="${transactions == null or transactions.isEmpty()}">
                        <td colspan="5" class="text-center py-4 text-muted">No transactions yet. Add one above.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
