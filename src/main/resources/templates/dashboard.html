<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Personal Finance Manager - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .income { color: #22c55e; font-weight: bold; }
        .expense { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4 text-center">💰 Personal Finance Manager</h1>

        <div class="row g-4">
            <!-- Balance Card -->
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <h5 class="text-muted">Current Balance</h5>
                    <h2 th:text="${balance}" class="display-5 fw-bold" style="color: #3b82f6;"></h2>
                </div>
            </div>
            <!-- Income Card -->
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <h5 class="text-muted">Total Income (Month)</h5>
                    <h2 th:text="${totalIncome}" class="display-5 income"></h2>
                </div>
            </div>
            <!-- Expense Card -->
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <h5 class="text-muted">Total Expense (Month)</h5>
                    <h2 th:text="${totalExpense}" class="display-5 expense"></h2>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h3>Recent Transactions</h3>
            <a href="/transactions" class="btn btn-primary mb-3">+ Add New Transaction</a>
            
            <table class="table table-hover table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th class="text-end">Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tx : ${transactions}">
                        <td th:text="${tx.date}"></td>
                        <td th:text="${tx.description}"></td>
                        <td th:text="${tx.category != null ? tx.category.name : 'Uncategorized'}"></td>
                        <td>
                            <span th:if="${tx.type == 'INCOME'}" class="badge bg-success">INCOME</span>
                            <span th:if="${tx.type == 'EXPENSE'}" class="badge bg-danger">EXPENSE</span>
                        </td>
                        <td class="text-end fw-bold" 
                            th:class="${tx.type == 'INCOME'} ? 'income' : 'expense'"
                            th:text="${tx.amount}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
